<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harshit Kumar Saxena | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <body>
    <div id="interactive-grid" class="interactive-grid"></div>


    <div class="container">
        <section id="home">
            <div class="hero-text">
                <p id="hero-greeting" style="margin:0; font-weight:600; color:var(--text-muted);font-size: 1rem;"></p>
                <h1><span id="hero-title-accent"></span> <span id="hero-title-main"></span></h1>
                <p id="hero-description"></p>
                
                <div class="social-links">
                    <a id="link-linkedin" href="#" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                    <a id="link-github" href="#" target="_blank"><i class="fa-brands fa-github"></i></a>
                </div>

                <div class="btn-group">
                    <a id="link-email" href="#" class="btn btn-primary">Contact Me</a>
                    <a id="link-resume" href="#" class="btn btn-secondary" download>Download Resume</a>
                </div>
            </div>
            <div class="hero-img">
                <img id="hero-image" src="" alt="Profile">
            </div>
        </section>

        <section id="education">
            <h2>Education</h2>
            
            <div class="project-item project-card-hover" style="display: block; padding: 30px; background: #fdfdfd;">
                
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px;">
                    <div style="flex: 1; min-width: 250px;">
                        <h3 style="margin-top: 0; margin-bottom: 12px; font-size: 1.4rem;">
                            <i class="fa-solid fa-graduation-cap" style="color: var(--accent); margin-right: 12px;"></i><span id="edu-degree"></span>
                        </h3>
                        
                        <div style="display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-weight: 600; font-size: 1.05rem; line-height: 1.4;">
                            <img src="assests/images/logo.png" alt="IIITDMJ Logo" style="height: 36px; width: 36px; object-fit: contain; border-radius: 6px;">
                            <span id="edu-institution"></span>
                        </div>
                        
                    </div>
                    
                    <div class="date-badge" style="margin-top: 0;">
                        <i class="fa-regular fa-calendar"></i>
                        <span id="edu-duration"></span>
                    </div>
                </div>

                <div style="margin-top: 25px;">
                    <div style="display: inline-flex; align-items: center; gap: 8px; background: #F8F8F8; color: #222222; padding: 6px 16px; border-radius: 6px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; border: 1px solid #222222;">
                        <i class="fa-solid fa-award"></i>
                        CGPA: <span id="edu-cgpa"></span>
                    </div>
                </div>
                
            </div>
        </section>

        <section id="about">
            <h2>About Me</h2>
            <div id="about-description" style="margin-bottom: 40px; line-height: 1.8;"></div>
            
            <div class="skills-grid" id="skills-container"></div>
        </section>

        <section id="experience">
            <h2>Experience</h2>
            <div id="experience-container"></div>
        </section>

        <section id="projects">
            <h2>Major Projects</h2>
            <div id="projects-container"></div>
        </section>

        <section id="leadership">
            <h2>Leadership & Activities</h2>
            <div id="leadership-container"></div>
        </section>
    </div>

    <script>
        // --- 1. DATA LOADING FUNCTION ---
        async function loadPortfolioData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                // 1. Populate Hero
                document.getElementById('hero-greeting').innerText = data.hero.greeting;
                document.getElementById('hero-title-accent').innerText = data.hero.titleAccent;
                document.getElementById('hero-description').innerText = data.hero.description;
                document.getElementById('link-linkedin').href = data.hero.linkedin;
                document.getElementById('link-github').href = data.hero.github;
                document.getElementById('link-email').href = `mailto:${data.hero.email}`;
                document.getElementById('link-resume').href = data.hero.resume;
                document.getElementById('hero-image').src = data.hero.image;

                // Populate Education
                document.getElementById('edu-degree').innerText = data.education.degree;
                document.getElementById('edu-institution').innerText = data.education.institution;
                document.getElementById('edu-cgpa').innerText = data.education.cgpa;
                document.getElementById('edu-duration').innerText = data.education.duration;

                // 2. Populate About
                document.getElementById('about-description').innerHTML = data.about.description;

               // 3. Populate Skills (Minimalist Monochrome Theme)
                const categoryThemes = {
                    "Languages": { icon: "fa-solid fa-code" },
                    "Robotics": { icon: "fa-solid fa-robot" },
                    "Hardware": { icon: "fa-solid fa-microchip" },
                    "Tools": { icon: "fa-solid fa-screwdriver-wrench" }
                };

                const skillsHtml = data.skills.map(skill => {
                    const theme = categoryThemes[skill.category] || { icon: "fa-solid fa-star" };
                    
                    // Tags are now styled purely by CSS, so we just inject the raw HTML
                    const tags = skill.items.split(',').map(item => 
                        `<span class="skill-tag">${item.trim()}</span>`
                    ).join('');
                    
                    return `
                    <div class="skill-category-card">
                        <h3 class="skill-category-title">
                            <i class="${theme.icon}" style="margin-right: 12px;"></i>${skill.category}
                        </h3>
                        <div class="skill-tags-container">
                            ${tags}
                        </div>
                    </div>
                    `;
                }).join('');
                document.getElementById('skills-container').innerHTML = skillsHtml;

                // 4. Populate Experience
                const expHtml = data.experience.map(exp => `
                    <div class="item">
                        <h3>${exp.role}</h3>
                        <span style="color: var(--text-muted); font-weight:600;">${exp.date}</span>
                        <ul>${exp.tasks.map(task => `<li>${task}</li>`).join('')}</ul>
                    </div>
                `).join('');
                document.getElementById('experience-container').innerHTML = expHtml;

                // 5. Populate Projects (Clickable Cards)
                const projHtml = data.projects.map(proj => `
                    <a href="${proj.link}" style="text-decoration: none; color: inherit; display: block;">
                        <div class="project-item project-card-hover">
                            <div class="project-media">
                                <img src="${proj.media}" alt="${proj.title} Media" onerror="this.src='https://via.placeholder.com/400x250?text=Project+Image'">
                            </div>
                            <div class="project-content">
                                <h3>${proj.title}</h3>
                                <p>${proj.description}</p>
                            </div>
                        </div>
                    </a>
                `).join('');
                document.getElementById('projects-container').innerHTML = projHtml;

                // 6. Populate Leadership
                const leadHtml = data.leadership.map(item => `
                    <div class="item">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                `).join('');
                document.getElementById('leadership-container').innerHTML = leadHtml;

            } catch (error) {
                console.error('Error loading data.json:', error);
            }
        }

        function initializeAnimations() {
            // A. Typewriter Effect for Hero Title
            const titleElement = document.getElementById('hero-title-accent');
            const text = titleElement.innerText; // Get the text that was just loaded from JSON
            titleElement.innerText = '';         // Clear it out to prepare for typing
            titleElement.classList.add('typewriter'); // Add the blinking cursor CSS class
            
            let i = 0;
            function type() {
                if (i < text.length) {
                    titleElement.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 50); // Speed of typing (50ms per letter)
                } else {
                    // Optional: remove blinking cursor 3 seconds after typing finishes
                    setTimeout(() => titleElement.classList.remove('typewriter'), 3000); 
                }
            }
            // Wait slightly before starting the typing effect
            setTimeout(type, 600); 

            // B. Scroll Reveal Observer (Fades sections in as you scroll down)
            const sections = document.querySelectorAll('section');
            
            // Hide all sections initially
            sections.forEach(sec => sec.classList.add('reveal'));

            // Watch for sections to enter the viewport
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active'); // Trigger the fade-up animation
                        observer.unobserve(entry.target); // Only animate once
                    }
                });
            }, { threshold: 0.15 }); // Triggers when 15% of the section is visible

            sections.forEach(sec => observer.observe(sec));
        }

        // --- 3. EXECUTE EVERYTHING ON LOAD ---
        document.addEventListener('DOMContentLoaded', async () => {
            // First, wait for all the data to be fetched and injected into the HTML
            await loadPortfolioData(); 
            // Second, apply the typewriter and scroll animations to that newly loaded data
            initializeAnimations();    
            
            // --- NEW: HAMBURGER MENU LOGIC ---
            const menuBtn = document.getElementById('menu-btn');
            const navLinks = document.getElementById('nav-links');
            const menuIcon = menuBtn.querySelector('i');

            // Toggle menu when clicking the hamburger
            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                // Switch icon between bars and an 'X'
                if (navLinks.classList.contains('active')) {
                    menuIcon.classList.replace('fa-bars', 'fa-xmark');
                } else {
                    menuIcon.classList.replace('fa-xmark', 'fa-bars');
                }
            });

            // Close the menu automatically when a link is clicked
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('active');
                    menuIcon.classList.replace('fa-xmark', 'fa-bars');
                });
            });
        });
       // --- UPGRADED: FULL-PAGE INDIVIDUAL CELL TRACKING GRID ---
        const gridContainer = document.getElementById('interactive-grid');
        const cellSize = 40; // Must match your CSS width/height
        let columns = 0;
        let rows = 0;

        function createInteractiveGrid() {
            gridContainer.innerHTML = '';
            
            // Calculate exact number of columns and rows (+1 to safely cover the edges)
            columns = Math.floor(window.innerWidth / cellSize) + 1;
            rows = Math.floor(window.innerHeight / cellSize) + 1;
            
            // THE FIX: Force the container to perfectly fit the calculated columns 
            // so the browser's flex-wrap doesn't break the tracking math
            gridContainer.style.width = `${columns * cellSize}px`;
            gridContainer.style.height = `${rows * cellSize}px`;

            const totalCells = columns * rows;

            // Generate the empty cells
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.classList.add('grid-cell');
                gridContainer.appendChild(cell);
            }
        }

        // Initialize grid on load and handle screen resizing
        createInteractiveGrid();
        window.addEventListener('resize', createInteractiveGrid);

        // THE FIX: Global mouse tracking (Bypasses z-index blocking)
        document.addEventListener('mousemove', (e) => {
            // Calculate which column and row the mouse is currently over
            const col = Math.floor(e.clientX / cellSize);
            const row = Math.floor(e.clientY / cellSize);
            
            // Convert the row/col into the specific index of the cell array
            const targetIndex = (row * columns) + col;
            const targetCell = gridContainer.children[targetIndex];

            // If the cell exists, light it up
            if (targetCell) {
                targetCell.classList.add('active');

                // Fade it out after 2 seconds
                setTimeout(() => {
                    targetCell.classList.remove('active');
                }, 1000);
            }
        });
    </script>
</body>
</html>
